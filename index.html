<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <title>Wordle</title>
</head>
<body class="bg-background">
    <div class="container mx-auto py-20">
        <div class="grid grid-cols-12 justify-items-center ">
            <!-- grid of squares -->
            <div class="text-white col-span-12 box-guesses mb-10" id="board">
            </div>
            
            <!-- keyboard -->
            <div class="col-span-12 flex-col flex items-center text-white text-6xl" id="keyboard">
                <ul class="flex items-center text-row">
                    <button class="button" type="submit" id="q">q</button>
                    <button class="button" type="submit" id="w">w</button>
                    <button class="button" type="submit" id="e">e</button>
                    <button class="button" type="submit" id="r">r</button>
                    <button class="button" type="submit" id="t">t</button>
                    <button class="button" type="submit" id="y">y</button>
                    <button class="button" type="submit" id="u">u</button>
                    <button class="button" type="submit" id="i">i</button>
                    <button class="button" type="submit" id="o">o</button>
                    <button class="button" type="submit" id="p">p</button>
                </ul>
                <ul class="flex items-center text-row">
                    <button class="button" type="submit" id="a">a</button>
                    <button class="button" type="submit" id="s">s</button>
                    <button class="button" type="submit" id="d">d</button>
                    <button class="button" type="submit" id="f">f</button>
                    <button class="button" type="submit" id="g">g</button>
                    <button class="button" type="submit" id="h">h</button>
                    <button class="button" type="submit" id="j">j</button>
                    <button class="button" type="submit" id="k">k</button>
                    <button class="button" type="submit" id="l">l</button>
                </ul>
                <ul class="flex items-center text-row">
                    <button class="button" type="submit" id="enter">enter</button>

                    <button class="button" type="submit" id="z">z</button>
                    <button class="button" type="submit" id="x">x</button>
                    <button class="button" type="submit" id="c">c</button>
                    <button class="button" type="submit" id="v">v</button>
                    <button class="button" type="submit" id="b">b</button>
                    <button class="button" type="submit" id="n">n</button>
                    <button class="button" type="submit" id="m">m</button>

                    <button class="button" type="submit" id="back">back</button>

                </ul>
                <button class="button" type="submit" id="reset">reset</button>
            </div>
        </div>
    </div>
    <script type="module" src="./scripts/app.js"></script>
</body>

</html>
